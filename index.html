<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Whoop Japan Store - P1Harmony UNIQUE</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 15px; line-height: 1.5; -webkit-tap-highlight-color: transparent; }
        .store-grid { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-top: 10px; }
        .product-card { background: white; width: 100%; max-width: 320px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; border-radius: 4px; box-sizing: border-box; }
        .status-bar { color: white; padding: 6px; font-weight: bold; font-size: 13px; text-align: center; margin-top: 5px; border-radius: 2px; }
        .bar-1 { background: linear-gradient(45deg, #e59393 25%, #d30019 25%, #d30019 50%, #e59393 50%, #e59393 75%, #d30019 75%); background-size: 20px 20px; }
        .bar-2 { background: linear-gradient(45deg, #7a98cc 25%, #337ab7 25%, #337ab7 50%, #7a98cc 50%, #7a98cc 75%, #337ab7 75%); background-size: 20px 20px; }
        .bar-3 { background: linear-gradient(45deg, #efd683 25%, #ccac00 25%, #ccac00 50%, #efd683 50%, #efd683 75%, #ccac00 75%); background-size: 20px 20px; }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 450px; border-radius: 8px; position: relative; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .modal-header { padding: 20px 20px 10px; border-bottom: 1px solid #eee; }
        .modal-body { padding: 0 20px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 15px 20px; border-top: 1px solid #eee; background: white; }

        select, input, .action-btn { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; border-radius: 4px; }
        .action-btn { background: black; color: white; border: none; font-weight: bold; cursor: pointer; }
        .confirm-btn { background: #ccc; color: #333; margin: 0; }

        .price-display { text-align: right; font-weight: bold; color: #d30019; font-size: 18px; margin: 5px 0; }
        
        .section-title { font-size: 12px; color: #888; margin: 15px 0 8px; text-transform: uppercase; letter-spacing: 1px; }
        .list-item { border: 1px solid #e0e0e0; border-radius: 4px; margin-bottom: 8px; padding: 12px; display: flex; align-items: center; text-align: left; position: relative; }
        .win-item { background-color: #fff0f1; border-color: #f5c6cb; }
        .lose-item { background-color: #f8f9fa; opacity: 0.6; }
        
        .badge-unused { background-color: #e59393; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-right: 8px; }
        .badge-lose { background-color: #adb5bd; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-right: 8px; }
        .check-icon { width: 18px; height: 18px; border: 2px solid #ccc; border-radius: 50%; margin-right: 12px; flex-shrink: 0; }
        .arrow-right { position:absolute; right:12px; color:#ccc; font-size: 12px; }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: #d30019; margin-bottom: 2px;">Whoop Japan Store</h2>
    <div style="text-align: center; color: #666; font-size: 12px; margin-bottom: 10px;">P1Harmony 9th Mini Album [UNIQUE]</div>
    
    <div class="store-grid">
        <div class="product-card" onclick="openPurchase(1, 7200)">
            <div class="status-bar bar-1">1部 特典会 参加権付き</div>
            <p style="font-size:13px;">P1Harmony UNIQUE 2枚セット<br><strong>¥7,200 (税込)</strong></p>
        </div>
        <div class="product-card" onclick="openPurchase(2, 7200)">
            <div class="status-bar bar-2">2部 特典会 参加権付き</div>
            <p style="font-size:13px;">P1Harmony UNIQUE 2枚セット<br><strong>¥7,200 (税込)</strong></p>
        </div>
        <div class="product-card" onclick="openPurchase(3, 3600)">
            <div class="status-bar bar-3">3部 特典会 抽選権付き</div>
            <p style="font-size:13px;">P1Harmony UNIQUE 1枚<br><strong>¥3,600 (税込)</strong></p>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title" style="margin: 0; font-size: 17px;">商品詳細</h3>
            </div>
            
            <div class="modal-body">
                <div id="purchase-selection-area">
                    <select id="date-select">
                        <option value="5/29(金)東京">5/29(金)東京</option>
                        <option value="5/30(土)東京">5/30(土)東京</option>
                        <option value="5/31(日)大阪">5/31(日)大阪</option>
                    </select>
                    <input type="number" id="buy-count" value="1" min="1" max="100" oninput="updateTotalPrice()">
                    <div class="price-display" id="total-price-text">¥0</div>
                    <button class="action-btn" onclick="confirmPurchase()">注文を確定する</button>
                    <button class="action-btn" style="background:#eee; color:#333;" onclick="closeModal()">キャンセル</button>
                </div>

                <div id="result-display-area" style="display: none;">
                    <div class="section-title">本次抽选结果</div>
                    <div id="current-results-container"></div>
                    
                    <div id="history-section" style="display: none;">
                        <div class="section-title">历史中奖记录</div>
                        <div id="history-container"></div>
                    </div>
                </div>
            </div>

            <div class="modal-footer" id="modal-footer-action" style="display: none;">
                <button class="action-btn confirm-btn" onclick="closeModal()">确认</button>
            </div>
        </div>
    </div>

    <script>
        let currentPart = 0, unitPrice = 0, historyWins = [];
        const members = ["KEEHO", "THEO", "JIUNG", "INTAK", "SOUL", "JONGSEOB"];
        const unitData = {
            "5/29(金)東京": { A: "KEEHO・THEO", B: "JIUNG・INTAK", C: "SOUL・JONGSEOB" },
            "5/30(土)東京": { A: "KEEHO ...", B: "JIUNG・SOUL", C: "THEO・JONGSEOB" },
            "5/31(日)大阪": { A: "KEEHO・SOUL", B: "THEO・JIUNG", C: "INTAK・JONGSEOB" }
        };

        // 一二部奖池权重调整：提高合影概率
        const fullPrizePool = [
            { name: "個別ハイタッチ会", weight: 45 },
            { name: "個別フォトカードお渡し会", weight: 20 },
            { name: "個別サイン会", weight: 15 },
            { name: "個別私物サイン会", weight: 10 },
            { name: "個別写真撮影会", weight: 10 } // 权重从 5 调至 10
        ];

        function openPurchase(part, price) {
            currentPart = part; unitPrice = price;
            document.getElementById('modal-title').innerText = `${part}部 特典会購入`;
            document.getElementById('buy-count').value = 1;
            updateTotalPrice();
            document.getElementById('purchase-selection-area').style.display = 'block';
            document.getElementById('result-display-area').style.display = 'none';
            document.getElementById('modal-footer-action').style.display = 'none';
            document.getElementById('modal').style.display = 'flex';
        }

        function updateTotalPrice() {
            const count = document.getElementById('buy-count').value || 0;
            document.getElementById('total-price-text').innerText = `¥${(count * unitPrice).toLocaleString()}`;
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function getFullPoolPrize() {
            const total = fullPrizePool.reduce((sum, p) => sum + p.weight, 0);
            let r = Math.random() * total;
            for (const p of fullPrizePool) {
                if (r < p.weight) return p.name;
                r -= p.weight;
            }
            return fullPrizePool[0].name;
        }

        function confirmPurchase() {
            const date = document.getElementById('date-select').value;
            const count = parseInt(document.getElementById('buy-count').value) || 1;
            let currentBatch = [];

            for (let i = 0; i < count; i++) {
                let entry = null;
                if (currentPart < 3) {
                    const prizeName = getFullPoolPrize();
                    const m = members[Math.floor(Math.random() * members.length)];
                    entry = { isWin: true, title: `${currentPart}部：${prizeName}`, detail: `メンバー：${m} / ${date}` };
                    historyWins.push(entry);
                } else {
                    if (Math.random() < 0.1) {
                        const uk = ['A', 'B', 'C'][Math.floor(Math.random() * 3)];
                        entry = { isWin: true, title: `3部：2:1 ユニット写真撮影会`, detail: `ユニット${uk}：${unitData[date][uk]} / ${date}` };
                        historyWins.push(entry);
                    } else {
                        entry = { isWin: false, title: `3部：2:1 ユニット写真撮影会`, detail: `落選 / ${date}` };
                    }
                }
                currentBatch.push(entry);
            }

            renderResults(currentBatch);
            document.getElementById('purchase-selection-area').style.display = 'none';
            document.getElementById('result-display-area').style.display = 'block';
            document.getElementById('modal-footer-action').style.display = 'block';
        }

        function renderResults(currentBatch) {
            const currentContainer = document.getElementById('current-results-container');
            const historyContainer = document.getElementById('history-container');
            const historySection = document.getElementById('history-section');

            currentContainer.innerHTML = currentBatch.map(item => createItemHTML(item)).join('');

            const oldWins = historyWins.filter(h => !currentBatch.includes(h)).reverse();
            if (oldWins.length > 0) {
                historySection.style.display = 'block';
                historyContainer.innerHTML = oldWins.map(item => createItemHTML(item)).join('');
            } else {
                historySection.style.display = 'none';
            }
        }

        function createItemHTML(item) {
            return `
                <div class="list-item ${item.isWin ? 'win-item' : 'lose-item'}">
                    <div class="check-icon"></div>
                    <div>
                        <span class="${item.isWin ? 'badge-unused' : 'badge-lose'}">${item.isWin ? '未使用' : '落選'}</span>
                        <div style="font-size:13px; font-weight:bold; margin-top:3px; color:black;">${item.isWin ? '当選：' : ''}${item.title}</div>
                        <div style="font-size:11px; color: #666;">${item.detail}</div>
                    </div>
                    <div class="arrow-right">＞</div>
                </div>
            `;
        }
    </script>
</body>
</html>
