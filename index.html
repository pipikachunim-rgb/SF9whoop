<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Whoop Japan Store - SF9 SPECIAL</title>
    <style>
  /* 修正卡片寬度，讓電腦版可以平排 */
        .product-card { 
            background: white; 
            width: calc(33.33% - 20px); /* 在電腦版佔約三分之一寬度 */
            min-width: 280px; /* 確保在小螢幕時不會縮得太小 */
            max-width: 320px; 
            padding: 15px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
            cursor: pointer; 
            border-radius: 4px; 
            box-sizing: border-box; 
        }

        /* 確保容器置中並允許換行 */
        .store-grid { 
            display: flex; 
            gap: 15px; 
            justify-content: center; 
            flex-wrap: wrap; 
            margin-top: 10px; 
        }

        /* 保持剛才的噴砂灰色質感設定 */
        .status-bar { 
            color: #333; 
            padding: 8px; 
            font-weight: bold; 
            font-size: 13px; 
            text-align: center; 
            margin-top: 5px; 
            border-radius: 4px; 
            position: relative; 
            overflow: hidden;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
        }

        .status-bar::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            opacity: 0.12;
            pointer-events: none;
            background-image: 
                radial-gradient(#000 10%, transparent 10%),
                radial-gradient(#000 10%, transparent 10%);
            background-size: 2px 2px;
            background-position: 0 0, 1px 1px;
        }

        .bar-1, .bar-2 { 
            background: linear-gradient(135deg, #a8a8a8 0%, #d1d1d1 100%);
            border: 1px solid #8e8e8e;
        }

        .bar-3 { 
            background: linear-gradient(135deg, #d6d6d6 0%, #f0f0f0 100%);
            border: 1px solid #b8b8b8;
        }
        
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; width: 90%; max-width: 450px; border-radius: 8px; position: relative; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
        
        .modal-header { padding: 20px 20px 10px; border-bottom: 1px solid #eee; }
        .modal-body { padding: 0 20px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 15px 20px; border-top: 1px solid #eee; background: white; }

        select, input, .action-btn { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; border-radius: 4px; }
        .action-btn { background: black; color: white; border: none; font-weight: bold; cursor: pointer; }
        .history-trigger-btn { background: #666; margin-top: 10px; }

        .price-display { text-align: right; font-weight: bold; color: #d30019; font-size: 18px; margin: 5px 0; }
        .total-spent-display { text-align: center; font-size: 14px; color: #333; margin-top: 20px; padding: 10px; border-top: 1px dashed #ccc; }
        
        .section-title { font-size: 12px; color: #888; margin: 15px 0 8px; text-transform: uppercase; letter-spacing: 1px; }
        .list-item { border: 1px solid #e0e0e0; border-radius: 4px; margin-bottom: 8px; padding: 12px; display: flex; align-items: center; text-align: left; position: relative; }
        .win-item { background-color: #fff0f1; border-color: #f5c6cb; }
        .lose-item { background-color: #f8f9fa; opacity: 0.6; }
        
        .badge-unused { background-color: #e59393; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-right: 8px; }
        .badge-lose { background-color: #adb5bd; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-right: 8px; }
        .check-icon { width: 18px; height: 18px; border: 2px solid #ccc; border-radius: 50%; margin-right: 12px; flex-shrink: 0; }
        .arrow-right { position:absolute; right:12px; color:#ccc; font-size: 12px; }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: #d30019; margin-bottom: 2px;">Whoop Japan Store</h2>
    <div style="text-align: center; color: #666; font-size: 12px; margin-bottom: 10px;">SF9 Special Album [About Love]</div>
    
    <div class="store-grid">
        <div class="product-card" onclick="openPurchase(1, 7200)">
            <div class="status-bar bar-1">1部 特典会 参加権付き</div>
            <p style="font-size:13px;">SF9 Special Album ‘About Love’ 2枚セット<br><strong>¥7,200 (税込)</strong></p>
        </div>
        <div class="product-card" onclick="openPurchase(2, 7200)">
            <div class="status-bar bar-2">2部 特典会 参加権付き</div>
            <p style="font-size:13px;">SF9 Special Album ‘About Love’ 2枚セット<br><strong>¥7,200 (税込)</strong></p>
        </div>
        <div class="product-card" onclick="openPurchase(3, 3600)">
            <div class="status-bar bar-3">3部 特典会 抽選權付き</div>
            <p style="font-size:13px;">SF9 Special Album ‘About Love’ 1枚<br><strong>¥3,600 (税込)</strong></p>
        </div>
    </div>

    <div class="total-spent-display" id="total-spent-area">
        総抽選金額: <span id="total-spent-amount">¥0</span>
        <button class="action-btn history-trigger-btn" onclick="openHistoryOnly()">過去当選記録</button>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title" style="margin: 0; font-size: 17px;">商品詳細</h3>
            </div>
            
            <div class="modal-body">
                <div id="purchase-selection-area">
                    <select id="date-select">
                        <option value="2026/05/23(土)東京">2026年5月23日(土) 東京</option>
                        <option value="2026/05/24(日)大阪">2026年5月24日(日) 大阪</option>
                    </select>
                    <input type="number" id="buy-count" value="1" min="1" max="100" oninput="updateTotalPrice()">
                    <div class="price-display" id="total-price-text">¥0</div>
                    <button class="action-btn" onclick="confirmPurchase()">注文を確定する</button>
                    <button class="action-btn" style="background:#eee; color:#333;" onclick="closeModal()">キャンセル</button>
                </div>

                <div id="result-display-area" style="display: none;">
                    <div class="section-title">この選考の結果</div>
                    <div id="current-results-container"></div>
                    
                    <div id="history-section">
                        <div class="section-title">過去当選記録</div>
                        <div id="history-container"></div>
                    </div>
                </div>
            </div>

            <div class="modal-footer" id="modal-footer-action" style="display: none;">
                <button class="action-btn" style="background:#ccc; color:#333;" onclick="closeModal()">閉じる</button>
            </div>
        </div>
    </div>

<script>
    let currentPart = 0, unitPrice = 0;
    const members = ["YOUNG BIN", "IN SEONG", "JAE YOON", "DA WON", "HWI YOUNG", "CHA NI"];
    const unitData = {
        "2026/05/23(土)東京": { A: "IN SEONG・CHA NI", B: "YOUNG BIN・DA WON", C: "JAE YOON・HWI YOUNG" },
        "2026/05/24(日)大阪": { A: "YOUNG BIN・CHA NI", B: "IN SEONG・DA WON", C: "JAE YOON・HWI YOUNG" }
    };
    const fullPrizePool = [
        { name: "個別ハイタッチ会", weight: 50 },
        { name: "個別フォトカードお渡し会", weight: 25 },
        { name: "個別サイン会", weight: 15 },
        { name: "個別写真撮影会", weight: 10 } 
    ];

    // 初始化：檢查 2 小時內的快取資料
    window.onload = function() {
        cleanOldData();
        updateDisplay();
    };

    function cleanOldData() {
        const lastUpdate = localStorage.getItem('last_update');
        const now = new Date().getTime();
        // 如果超過 2 小時 (2 * 60 * 60 * 1000 毫秒)，清除數據
        if (lastUpdate && (now - lastUpdate > 7200000)) {
            localStorage.removeItem('history_wins');
            localStorage.removeItem('total_spent');
        }
    }

    function updateDisplay() {
        const total = localStorage.getItem('total_spent') || 0;
        document.getElementById('total-spent-amount').innerText = `¥${parseInt(total).toLocaleString()}`;
    }

    function openPurchase(part, price) {
        currentPart = part; unitPrice = price;
        document.getElementById('modal-title').innerText = `${part}部 特典会購入`;
        document.getElementById('buy-count').value = 1;
        updateTotalPrice();
        document.getElementById('purchase-selection-area').style.display = 'block';
        document.getElementById('result-display-area').style.display = 'none';
        document.getElementById('modal-footer-action').style.display = 'none';
        document.getElementById('modal').style.display = 'flex';
    }

    function openHistoryOnly() {
        cleanOldData();
        document.getElementById('modal-title').innerText = `過去当選記録`;
        document.getElementById('purchase-selection-area').style.display = 'none';
        document.getElementById('result-display-area').style.display = 'block';
        document.getElementById('current-results-container').innerHTML = '';
        renderHistory();
        document.getElementById('modal-footer-action').style.display = 'block';
        document.getElementById('modal').style.display = 'flex';
    }

    function updateTotalPrice() {
        const count = document.getElementById('buy-count').value || 0;
        document.getElementById('total-price-text').innerText = `¥${(count * unitPrice).toLocaleString()}`;
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function getFullPoolPrize() {
        const total = fullPrizePool.reduce((sum, p) => sum + p.weight, 0);
        let r = Math.random() * total;
        for (const p of fullPrizePool) {
            if (r < p.weight) return p.name;
            r -= p.weight;
        }
        return fullPrizePool[0].name;
    }

    function confirmPurchase() {
        const date = document.getElementById('date-select').value;
        const count = parseInt(document.getElementById('buy-count').value) || 1;
        let currentBatch = [];
        let historyWins = JSON.parse(localStorage.getItem('history_wins') || "[]");
        let totalSpent = parseInt(localStorage.getItem('total_spent') || "0");

        for (let i = 0; i < count; i++) {
            let entry = null;
            if (currentPart < 3) {
                const prizeName = getFullPoolPrize();
                const m = members[Math.floor(Math.random() * members.length)];
                entry = { isWin: true, title: `${currentPart}部：${prizeName}`, detail: `メンバー：${m} / ${date}` };
                historyWins.push(entry);
            } else {
                if (Math.random() < 0.1) {
                    const uk = ['A', 'B', 'C'][Math.floor(Math.random() * 3)];
                    entry = { isWin: true, title: `3部：2:1 ユニット写真撮影会`, detail: `ユニット${uk}：${unitData[date][uk]} / ${date}` };
                    historyWins.push(entry);
                } else {
                    entry = { isWin: false, title: `3部：2:1 ユニット写真撮影會`, detail: `落選 / ${date}` };
                }
            }
            currentBatch.push(entry);
        }

        // 儲存資料
        totalSpent += (count * unitPrice);
        localStorage.setItem('history_wins', JSON.stringify(historyWins));
        localStorage.setItem('total_spent', totalSpent);
        localStorage.setItem('last_update', new Date().getTime());

        // 更新 UI
        renderResults(currentBatch, historyWins);
        updateDisplay();
        document.getElementById('purchase-selection-area').style.display = 'none';
        document.getElementById('result-display-area').style.display = 'block';
        document.getElementById('modal-footer-action').style.display = 'block';
    }

    function renderResults(currentBatch, historyWins) {
        document.getElementById('current-results-container').innerHTML = currentBatch.map(item => createItemHTML(item)).join('');
        renderHistory();
    }

    function renderHistory() {
        let historyWins = JSON.parse(localStorage.getItem('history_wins') || "[]");
        const container = document.getElementById('history-container');
        if (historyWins.length > 0) {
            container.innerHTML = [...historyWins].reverse().map(item => createItemHTML(item)).join('');
        } else {
            container.innerHTML = '<div style="font-size:12px; color:#999; text-align:center; padding:20px;">記録がありません</div>';
        }
    }

    function createItemHTML(item) {
        return `
            <div class="list-item ${item.isWin ? 'win-item' : 'lose-item'}">
                <div class="check-icon"></div>
                <div>
                    <span class="${item.isWin ? 'badge-unused' : 'badge-lose'}">${item.isWin ? '未使用' : '落選'}</span>
                    <div style="font-size:13px; font-weight:bold; margin-top:3px; color:black;">${item.isWin ? '当選：' : ''}${item.title}</div>
                    <div style="font-size:11px; color: #666;">${item.detail}</div>
                </div>
                <div class="arrow-right">＞</div>
            </div>
        `;
    }
</script>
</body>
</html>
