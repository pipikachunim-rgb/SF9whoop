<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whoop Japan Store - P1Harmony UNIQUE</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; margin: 0; padding: 20px; line-height: 1.5; }
        .store-grid { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-top: 20px; }
        .product-card { background: white; width: 300px; padding: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; border-radius: 4px; }
        .status-bar { color: white; padding: 8px; font-weight: bold; font-size: 14px; text-align: center; margin-top: 5px; border-radius: 2px; }
        .bar-1 { background: linear-gradient(45deg, #e59393 25%, #d30019 25%, #d30019 50%, #e59393 50%, #e59393 75%, #d30019 75%); background-size: 20px 20px; }
        .bar-2 { background: linear-gradient(45deg, #7a98cc 25%, #337ab7 25%, #337ab7 50%, #7a98cc 50%, #7a98cc 75%, #337ab7 75%); background-size: 20px 20px; }
        .bar-3 { background: linear-gradient(45deg, #efd683 25%, #ccac00 25%, #ccac00 50%, #efd683 50%, #efd683 75%, #ccac00 75%); background-size: 20px 20px; }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; width: 450px; border-radius: 4px; position: relative; max-height: 85vh; overflow-y: auto; }
        select, input, .action-btn { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; font-size: 14px; box-sizing: border-box; }
        .action-btn { background: black; color: white; border: none; font-weight: bold; cursor: pointer; }
        .cancel-btn { background: #eee; color: #333; }

        .price-display { text-align: right; font-weight: bold; color: #d30019; font-size: 18px; margin: 5px 0; }
        .status-box { padding: 15px; font-weight: bold; text-align: center; margin-top: 20px; display: none; border-radius: 4px; }
        .win-box { border: 2px solid #d30019; color: #d30019; }
        .lose-box { background-color: #5e646a; color: white; }
        
        #result-list-area { display: none; margin-top: 20px; border-top: 1px solid #eee; padding-top: 20px; }
        .list-item { border: 1px solid #e0e0e0; border-radius: 4px; margin-bottom: 10px; padding: 15px; display: flex; align-items: center; text-align: left; position: relative; }
        .win-item { background-color: #fff0f1; border-color: #f5c6cb; }
        .lose-item { background-color: #f8f9fa; filter: grayscale(1); opacity: 0.8; }
        
        .badge-unused { background-color: #e59393; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-right: 10px; }
        .badge-lose { background-color: #adb5bd; color: white; font-size: 10px; padding: 2px 6px; border-radius: 10px; margin-right: 10px; }
        .check-icon { width: 20px; height: 20px; border: 2px solid #ccc; border-radius: 50%; margin-right: 15px; }
        .arrow-right { position:absolute; right:15px; color:#ccc; }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: #d30019;">Whoop Japan Store</h2>
    
    <div class="store-grid">
        <div class="product-card" onclick="openPurchase(1, 7200)">
            <div class="status-bar bar-1">1部 特典会 参加権付き</div>
            <p style="font-size:14px;">P1Harmony UNIQUE 2枚セット<br><strong>¥7,200 (税込)</strong></p>
        </div>
        <div class="product-card" onclick="openPurchase(2, 7200)">
            <div class="status-bar bar-2">2部 特典会 参加権付き</div>
            <p style="font-size:14px;">P1Harmony UNIQUE 2枚セット<br><strong>¥7,200 (税込)</strong></p>
        </div>
        <div class="product-card" onclick="openPurchase(3, 3600)">
            <div class="status-bar bar-3">3部 特典会 抽選権付き</div>
            <p style="font-size:14px;">P1Harmony UNIQUE 1枚<br><strong>¥3,600 (税込)</strong></p>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <h3 id="modal-title" style="margin-top: 0;">商品詳細</h3>
            
            <div id="purchase-selection-area">
                <label style="font-size: 12px; color: #666;">日程选择：</label>
                <select id="date-select">
                    <option value="5/29(金)東京">5/29(金)東京</option>
                    <option value="5/30(土)東京">5/30(土)東京</option>
                    <option value="5/31(日)大阪">5/31(日)大阪</option>
                </select>
                
                <label style="font-size: 12px; color: #666;">购买数量：</label>
                <input type="number" id="buy-count" value="1" min="1" max="50" oninput="updateTotalPrice()">
                
                <div class="price-display" id="total-price-text">¥7,200</div>
                
                <button class="action-btn" onclick="confirmPurchase()">注文を確定する</button>
                <button class="action-btn cancel-btn" onclick="closeModal()">キャンセル</button>
            </div>

            <div id="win-banner" class="status-box win-box">当選しました</div>
            <div id="lose-banner" class="status-box lose-box">落選しました</div>

            <div id="result-list-area">
                <div style="text-align: center; color: #666; margin-bottom: 15px; font-size: 14px;">抽選結果一覧</div>
                <div id="list-container"></div>
                <button class="action-btn" style="background: #ccc; margin-top: 20px;" onclick="closeModal()">確認</button>
            </div>
        </div>
    </div>

    <script>
        let currentPart = 0;
        let unitPrice = 0;
        let allResults = [];
        let userLuckSeed = Math.random(); 

        const members = ["KEEHO", "THEO", "JIUNG", "INTAK", "SOUL", "JONGSEOB"];
        const unitData = {
            "5/29(金)東京": { A: "KEEHO・THEO", B: "JIUNG・INTAK", C: "SOUL・JONGSEOB" },
            "5/30(土)東京": { A: "KEEHO・INTAK", B: "JIUNG・SOUL", C: "THEO・JONGSEOB" },
            "5/31(日)大阪": { A: "KEEHO・SOUL", B: "THEO・JIUNG", C: "INTAK・JONGSEOB" }
        };

        function openPurchase(part, price) {
            currentPart = part;
            unitPrice = price;
            document.getElementById('modal-title').innerText = `${part}部 特典会購入`;
            document.getElementById('buy-count').value = 1;
            updateTotalPrice();
            
            document.getElementById('purchase-selection-area').style.display = 'block';
            document.getElementById('win-banner').style.display = 'none';
            document.getElementById('lose-banner').style.display = 'none';
            document.getElementById('result-list-area').style.display = 'none';
            document.getElementById('modal').style.display = 'flex';
        }

        function updateTotalPrice() {
            const count = document.getElementById('buy-count').value || 0;
            const total = count * unitPrice;
            document.getElementById('total-price-text').innerText = `¥${total.toLocaleString()}`;
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function confirmPurchase() {
            const date = document.getElementById('date-select').value;
            const count = parseInt(document.getElementById('buy-count').value) || 1;
            let batchHasWin = false;
            let batchHasLose = false;

            for (let i = 0; i < count; i++) {
                let entry = null;
                // 模拟运气波动
                if(Math.random() < 0.05) userLuckSeed = Math.random();

                if (currentPart === 1 || currentPart === 2) {
                    const member = members[Math.floor(Math.random() * members.length)];
                    entry = { isWin: true, title: `${currentPart}部：個別ハイタッチ会`, detail: `メンバー：${member} / ${date}` };
                    batchHasWin = true;
                } else {
                    const roll = Math.random();
                    let threshold = (userLuckSeed > 0.9) ? 0.2 : (userLuckSeed < 0.3 ? 0.001 : 0.01);
                    if (roll < threshold) {
                        const typeRoll = Math.random();
                        if (typeRoll < 0.1) {
                            entry = { isWin: true, title: `3部：6:1 団体写真撮影会`, detail: `全メンバー出演 / ${date}` };
                        } else {
                            const uk = ['A', 'B', 'C'][Math.floor(Math.random() * 3)];
                            entry = { isWin: true, title: `3部：2:1 ユニット写真撮影会`, detail: `ユニット${uk}：${unitData[date][uk]} / ${date}` };
                        }
                        batchHasWin = true;
                    } else {
                        entry = { isWin: false, title: `3部：抽選特典会`, detail: `落選 / ${date}` };
                        batchHasLose = true;
                    }
                }
                allResults.push(entry);
            }

            renderHistory();
            document.getElementById('purchase-selection-area').style.display = 'none';
            
            // 如果这一批里有中的，优先显示中奖Banner
            if (batchHasWin) {
                document.getElementById('win-banner').style.display = 'block';
            } else if (batchHasLose) {
                document.getElementById('lose-banner').style.display = 'block';
            }
            
            document.getElementById('result-list-area').style.display = 'block';
        }

        function renderHistory() {
            const container = document.getElementById('list-container');
            const wins = allResults.filter(r => r.isWin).reverse();
            const loses = allResults.filter(r => !r.isWin).reverse();
            const sortedResults = wins.concat(loses);

            container.innerHTML = sortedResults.map(item => `
                <div class="list-item ${item.isWin ? 'win-item' : 'lose-item'}">
                    <div class="check-icon"></div>
                    <div>
                        <span class="${item.isWin ? 'badge-unused' : 'badge-lose'}">${item.isWin ? '未使用' : '落選'}</span>
                        <div style="font-size:13px; font-weight:bold; margin-top:5px; color:black;">
                            ${item.isWin ? '当選：' : ''}${item.title}
                        </div>
                        <div style="font-size:11px; color: #666;">${item.detail}</div>
                    </div>
                    <div class="arrow-right">＞</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
